<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Outfit:wght@300;400;500;600&display=swap');

:root {
  --bg1: #0a0a12;
  --bg2: #0d0d1a;
  --accent: #7c5cf6;
  --accent2: #a78bfa;
  --text: #f0eeff;
  --muted: #7070a0;
  --card: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; min-height: 100%;
  font-family: 'Outfit', sans-serif;
  color: var(--text);
  overflow-x: hidden;
}

/* ── DYNAMIC BACKGROUND ── */
#bg {
  position: fixed; inset: 0; z-index: 0;
  transition: background 1.4s cubic-bezier(0.4,0,0.2,1);
  background: radial-gradient(ellipse 80% 60% at 20% 30%, #1a0533 0%, #0a0a12 60%),
              radial-gradient(ellipse 60% 80% at 80% 70%, #0a1a33 0%, transparent 70%);
}

/* Particle canvas */
#particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

/* Floating orbs */
.orb {
  position: fixed; border-radius: 50%;
  filter: blur(80px); opacity: 0.18;
  pointer-events: none; z-index: 1;
  transition: all 2s cubic-bezier(0.4,0,0.2,1);
  animation: orbFloat 8s ease-in-out infinite alternate;
}
.orb1 { width: 400px; height: 400px; top: -100px; left: -100px; }
.orb2 { width: 300px; height: 300px; bottom: -80px; right: -80px; animation-delay: -3s; }
.orb3 { width: 200px; height: 200px; top: 40%; left: 50%; transform: translate(-50%,-50%); animation-delay: -6s; }

@keyframes orbFloat {
  from { transform: translate(0, 0) scale(1); }
  to   { transform: translate(30px, -40px) scale(1.1); }
}

/* Grain overlay */
#grain {
  position: fixed; inset: 0; z-index: 2;
  pointer-events: none; opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  animation: grainShift 0.5s steps(1) infinite;
}
@keyframes grainShift {
  0%  { background-position: 0 0; }
  25% { background-position: -30px 20px; }
  50% { background-position: 20px -10px; }
  75% { background-position: -10px -30px; }
}

/* ── LAYOUT ── */
#app {
  position: relative; z-index: 10;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 32px 16px 60px;
}

/* Header */
.site-header {
  text-align: center; margin-bottom: 36px;
  animation: fadeUp 0.8s ease both;
}
.site-header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  font-weight: 900;
  letter-spacing: -0.02em;
  color: #fff;
  line-height: 1.1;
}
.site-header h1 span {
  background: linear-gradient(135deg, var(--accent2), #f0abfc);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.site-header p {
  font-size: 0.78rem;
  color: var(--muted);
  margin-top: 6px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* Theme badge */
#theme-badge {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px; border-radius: 40px;
  font-size: 0.72rem; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  margin: 0 auto 24px;
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.06);
  width: fit-content;
  transition: all 0.6s ease;
  animation: fadeUp 0.9s ease both;
}
#theme-badge .tbdot {
  width: 8px; height: 8px; border-radius: 50%;
  transition: background 0.6s;
}

/* Progress */
#progress-wrap {
  display: flex; gap: 5px; margin-bottom: 28px;
  width: 100%; max-width: 500px;
  animation: fadeUp 1s ease both;
}
.pseg {
  flex: 1; height: 3px; border-radius: 4px;
  background: rgba(255,255,255,0.1);
  transition: background 0.5s ease;
  position: relative; overflow: hidden;
}
.pseg.done { background: var(--accent2); }
.pseg.done::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  animation: shimmer 2s ease infinite;
}
@keyframes shimmer { from{transform:translateX(-100%)} to{transform:translateX(100%)} }

/* Trail */
#trail-wrap {
  display: flex; flex-wrap: wrap; gap: 6px;
  justify-content: center; max-width: 560px;
  margin-bottom: 16px; min-height: 24px;
}
.trail-chip {
  display: flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 0.68rem; font-weight: 500;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.6);
  backdrop-filter: blur(6px);
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn { from{transform:scale(0.6);opacity:0} to{transform:scale(1);opacity:1} }

/* Card */
.card {
  width: 100%; max-width: 540px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 24px 24px 20px;
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
  animation: fadeUp 0.45s cubic-bezier(0.22,1,0.36,1) both;
  margin-bottom: 8px;
}
.card .phase-label {
  font-size: 0.62rem; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--accent2); margin-bottom: 10px;
  opacity: 0.8;
}
.card .phase-icon { font-size: 2rem; display: block; margin-bottom: 8px; }
.card .q-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem; font-weight: 700;
  color: #fff; line-height: 1.3; margin-bottom: 5px;
}
.card .q-sub {
  font-size: 0.76rem; color: var(--muted);
  line-height: 1.55;
}

/* Arrow */
.connector {
  width: 1px; height: 30px;
  background: linear-gradient(to bottom, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
  margin: 0 auto;
  position: relative;
}
.connector::after {
  content: '';
  position: absolute; bottom: 0; left: 50%;
  transform: translateX(-50%);
  border-left: 4px solid transparent;
  border-right: 4px solid transparent;
  border-top: 6px solid rgba(255,255,255,0.2);
}

/* Choices */
#choices-wrap {
  width: 100%; max-width: 560px;
  display: flex; flex-wrap: wrap;
  gap: 10px; justify-content: center;
}

.choice {
  flex: 1; min-width: 140px; max-width: 200px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 16px 14px 18px;
  cursor: pointer;
  position: relative; overflow: hidden;
  transition: transform 0.22s cubic-bezier(0.22,1,0.36,1),
              border-color 0.2s, box-shadow 0.2s;
  backdrop-filter: blur(12px);
  animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
  text-align: left;
}
.choice:nth-child(2) { animation-delay: 0.06s; }
.choice:nth-child(3) { animation-delay: 0.12s; }
.choice:nth-child(4) { animation-delay: 0.18s; }

.choice::before {
  content: ''; position: absolute; inset: 0;
  opacity: 0; transition: opacity 0.3s;
  border-radius: 16px;
}
.choice:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
.choice:hover::before { opacity: 1; }
.choice:active { transform: scale(0.97); }

.choice .c-emoji { font-size: 1.6rem; display: block; margin-bottom: 8px; }
.choice .c-title {
  font-family: 'Playfair Display', serif;
  font-size: 0.92rem; font-weight: 700;
  color: #fff; margin-bottom: 5px;
}
.choice .c-desc { font-size: 0.7rem; color: var(--muted); line-height: 1.45; }
.choice .c-tag {
  display: inline-block; margin-top: 10px;
  padding: 3px 9px; border-radius: 20px;
  font-size: 0.6rem; font-weight: 700;
  letter-spacing: 0.07em; text-transform: uppercase;
}

/* Hover glow per theme */
.choice.glow-green:hover { border-color: rgba(74,222,128,0.4); box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(74,222,128,0.15); }
.choice.glow-blue:hover  { border-color: rgba(96,165,250,0.4); box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(96,165,250,0.15); }
.choice.glow-red:hover   { border-color: rgba(248,113,113,0.4); box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(248,113,113,0.15); }
.choice.glow-yellow:hover{ border-color: rgba(250,204,21,0.4); box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(250,204,21,0.15); }
.choice.glow-purple:hover{ border-color: rgba(192,132,252,0.4); box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(192,132,252,0.15); }

.tag-green  { background: rgba(74,222,128,0.12);  color: #4ade80; border: 1px solid rgba(74,222,128,0.25); }
.tag-blue   { background: rgba(96,165,250,0.12);  color: #60a5fa; border: 1px solid rgba(96,165,250,0.25); }
.tag-red    { background: rgba(248,113,113,0.12); color: #f87171; border: 1px solid rgba(248,113,113,0.25); }
.tag-yellow { background: rgba(250,204,21,0.12);  color: #facc15; border: 1px solid rgba(250,204,21,0.25); }
.tag-purple { background: rgba(192,132,252,0.12); color: #c084fc; border: 1px solid rgba(192,132,252,0.25); }

/* Final */
#final-wrap {
  width: 100%; max-width: 540px;
  display: none; flex-direction: column; align-items: center; gap: 16px;
}
.final-card {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 24px;
  padding: 32px 28px;
  backdrop-filter: blur(24px);
  box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.12);
  text-align: center;
  animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
}
.final-icon { font-size: 3.5rem; margin-bottom: 14px; display: block; animation: bounce 0.8s ease 0.3s both; }
@keyframes bounce { 0%{transform:scale(0);opacity:0} 60%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }
.final-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem; font-weight: 900; color: #fff;
  margin-bottom: 8px;
}
.final-sub { font-size: 0.82rem; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }

.stats-row { display: flex; gap: 10px; margin-bottom: 20px; }
.stat { flex: 1; background: rgba(255,255,255,0.05); border-radius: 14px; padding: 14px 8px; }
.stat-val {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem; font-weight: 900;
  background: linear-gradient(135deg, var(--accent2), #f0abfc);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.stat-key { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 3px; }

.path-log { display: flex; flex-direction: column; gap: 7px; text-align: left; margin-bottom: 20px; }
.path-row {
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.04); border-radius: 10px;
  padding: 8px 12px; border: 1px solid rgba(255,255,255,0.07);
}
.path-row .pr-icon { font-size: 0.95rem; }
.path-row .pr-key { font-size: 0.7rem; color: var(--muted); flex: 1; }
.path-row .pr-val { font-size: 0.72rem; font-weight: 600; color: rgba(255,255,255,0.85); }

.replay-btn {
  width: 100%;
  padding: 14px;
  border: none; border-radius: 14px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem; font-weight: 600;
  color: #fff; cursor: pointer;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  transition: all 0.2s;
  letter-spacing: 0.02em;
}
.replay-btn:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(124,92,246,0.4); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Scroll hint */
.scroll-hint {
  font-size: 0.65rem; color: var(--muted);
  text-align: center; margin-top: 10px;
  opacity: 0.5; letter-spacing: 0.08em;
}
</style>
</head>

<div id="grain"></div>

  <div class="connector"></div>

  <div id="choices-wrap"></div>

  <div class="scroll-hint" id="scroll-hint">scroll down to see choices ↓</div>

  <!-- Final -->
  <div id="final-wrap">
    <div class="final-card">
      <span class="final-icon" id="f-icon">🌟</span>
      <div class="final-title" id="f-title"></div>

      <div class="stats-row" id="f-stats"></div>

</div>

/* ─── PARTICLE ENGINE ─── */
const canvas = document.getElementById('particles');
const ctx2 = canvas.getContext('2d');
let particles = [];
let particleColor = '#a78bfa';
let animFrame;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function initParticles() {
  particles = [];
  for (let i = 0; i < 55; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 2.5 + 0.5,
      vx: (Math.random()-0.5) * 0.4,
      vy: -(Math.random() * 0.6 + 0.1),
      o: Math.random() * 0.6 + 0.1,
      life: Math.random(),
    });
  }
}
initParticles();

function animParticles() {
  ctx2.clearRect(0, 0, canvas.width, canvas.height);
  const rgb = hexToRgb(particleColor);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.life -= 0.002;
    if (p.life <= 0 || p.y < -10) {
      p.x = Math.random() * canvas.width;
      p.y = canvas.height + 10;
      p.life = Math.random() * 0.8 + 0.2;
    }
    ctx2.beginPath();
    ctx2.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx2.fillStyle = `rgba(${rgb},${p.o * p.life})`;
    ctx2.fill();
  });
  animFrame = requestAnimationFrame(animParticles);
}
animParticles();

  const lifeScore = Math.min(100, score);

  else if (lifeScore>=60) {icon='⚡';title='The Fighter';     sub='You faced real walls — and still built something that mattered.';}
  else if (lifeScore>=40) {icon='🌱';title='The Grower';      sub='Every struggle planted seeds. Your story is still being written.';}
  else                    {icon='🕊️';title='The Survivor';   sub='Against enormous odds, you kept going. That alone is extraordinary.';}

  document.getElementById('f-icon').textContent = icon;
  document.getElementById('f-title').textContent = title;
  document.getElementById('f-sub').textContent = sub;

  document.getElementById('f-stats').innerHTML = `
    <div class="stat"><div class="stat-val">${lifeScore}</div><div class="stat-key">Life Score</div></div>
    <div class="stat"><div class="stat-val">${happy}%</div><div class="stat-key">Happiness</div></div>
    <div class="stat"><div class="stat-val">${Math.max(0,impact)}%</div><div class="stat-key">Impact</div></div>
  `;

  const icons2 = {background:'🧬',school:'🏫',extra:'🎯',college:'🎓',career_start:'💼',career_growth:'📈',relationship:'❤️',personal:'✨',event:'⚡'};
  const keys2 = Object.keys(TRAIL_LABELS);
  document.getElementById('f-log').innerHTML = trailData.map(t=>`
    <div class="path-row">
      <span class="pr-icon">${icons2[t.key]||'•'}</span>
      <span class="pr-key">${t.key.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}</span>
      <span class="pr-val">${TRAIL_LABELS[t.key]?.[t.val]||t.val}</span>
    </div>
  `).join('');

  // Final theme
  if (lifeScore>=80) applyTheme('opportunity');
  else if (lifeScore>=60) applyTheme('balanced');
  else applyTheme('crisis');
}

/* ─── RESTART ─── */
function restart() {
  state={}; trailData=[]; step=0;
  document.getElementById('qcard').style.display='';
  document.getElementById('choices-wrap').style.display='';
  document.querySelector('.connector').style.display='';
  document.getElementById('scroll-hint').style.display='';
  document.getElementById('final-wrap').style.display='none';
  document.getElementById('trail-wrap').innerHTML='';
  applyTheme('default');
  showBackground();
}

/* ─── START ─── */
showBackground();
</script>
